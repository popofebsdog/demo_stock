name: Update Taiwan stock watchlist

on:
  schedule:
    - cron: "20 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Restore market data cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-
      - name: Generate static watchlist data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_static_data.py --backfill 1
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/latest.json static/dates.json static/data
          git diff --cached --quiet || git commit -m "chore: update watchlist data"
          git push
